<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Activities</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h2>Activities</h2>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="index.html">Home</a>
    </div>
  </nav>

  <section class="container">
    <h1>Activities</h1>
    
    <div class="cards">
      
    </div>

    <hr style="margin:30px 0; border-color:rgba(255,255,255,0.08)">

    <div class="container glass">
      <h2>Calculator</h2>
      <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">
        <div class="buttons">
          <button type="button" onclick="appendValue('7')">7</button>
          <button type="button" onclick="appendValue('8')">8</button>
          <button type="button" onclick="appendValue('9')">9</button>
          <button type="button" onclick="appendOperator('/')">÷</button>

          <button type="button" onclick="appendValue('4')">4</button>
          <button type="button" onclick="appendValue('5')">5</button>
          <button type="button" onclick="appendValue('6')">6</button>
          <button type="button" onclick="appendOperator('*')">×</button>

          <button type="button" onclick="appendValue('1')">1</button>
          <button type="button" onclick="appendValue('2')">2</button>
          <button type="button" onclick="appendValue('3')">3</button>
          <button type="button" onclick="appendOperator('-')">−</button>

          <button type="button" onclick="appendValue('0')">0</button>
          <button type="button" onclick="appendDot()">.</button>
          <button type="button" onclick="calculateResult()">=</button>
          <button type="button" onclick="appendOperator('+')">+</button>

          <button type="button" class="wide" onclick="clearDisplay()">C</button>
          <button type="button" class="wide" onclick="deleteLast()">DEL</button>
        </div>
      </div>
    </div>

  </section>

  <script>
    const display = document.getElementById('display');

    function appendValue(value) {
      if (!display) return;
      if (display.value === '0' && value !== '.') {
        display.value = value;
      } else {
        display.value += value;
      }
    }

    function appendOperator(operator) {
      if (!display) return;
      if (!display.value) return;
      const lastChar = display.value.slice(-1);
      if ('+-*/'.includes(lastChar)) {
        display.value = display.value.slice(0, -1) + operator;
      } else {
        display.value += operator;
      }
    }

    function appendDot() {
      if (!display) return;
      const parts = display.value.split(/[-+*/]/);
      const lastPart = parts[parts.length - 1];
      if (!lastPart.includes('.')) {
        display.value += display.value ? '.' : '0.';
      }
    }

    function clearDisplay() {
      if (!display) return;
      display.value = '';
    }

    function deleteLast() {
      if (!display) return;
      display.value = display.value.slice(0, -1);
    }

    function calculateResult() {
      if (!display) return;
      try {
        const safeExpr = display.value.replace(/×/g, '*').replace(/÷/g, '/');
        // Basic eval — keep simple for this class activity
        const result = eval(safeExpr);
        display.value = result;
      } catch (error) {
        display.value = 'Error';
      }
    }
  </script>
</body>
</html>
